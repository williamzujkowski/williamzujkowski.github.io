name: Debug Eleventy Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm ci
        
      - name: List directory structure
        run: find . -type f -not -path "./node_modules/*" | sort
        
      - name: View layouts directory
        run: ls -la _layouts/
        
      - name: View layout files
        run: cat _layouts/base.njk
        
      - name: Build with Eleventy (Debug Mode)
        run: DEBUG=Eleventy* npx @11ty/eleventy --config=.eleventy.simple.cjs