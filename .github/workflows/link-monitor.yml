name: Link Health Monitor

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Force check all links'
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - 'src/posts/**/*.md'
      - 'src/pages/**/*.md'

# Default to least privilege. The check-links job opens an issue on scheduled
# failures (issues: write) and comments on PRs (pull-requests: write); the
# repair-links job overrides this to push auto-fixes.
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: '3.11'

    - name: Install UV
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

    - name: Install Python Dependencies
      run: |
        uv pip install --system --upgrade pip
        uv pip install --system "aiohttp>=3.13.3" "urllib3>=2.6.3"

    - name: Extract Links
      run: |
        uv run python scripts/link-validation/link-extractor.py \
          --posts-dir src/posts \
          --output links.json

    - name: Validate Links
      run: |
        uv run python scripts/link-validation/simple-validator.py \
          --links links.json \
          --output validation.json

    - name: Find Repairs
      run: |
        mkdir -p reports
        # Create placeholder relevance file
        echo '{"results": []}' > relevance.json

        # Write repairs.json INTO reports/ so it travels in the uploaded
        # artifact and the repair-links job can actually find it.
        uv run python scripts/link-validation/citation-repair.py \
          --links links.json \
          --validation validation.json \
          --relevance relevance.json \
          --output reports/repairs.json || true

    - name: Generate Reports
      run: |
        mkdir -p reports
        uv run python scripts/link-validation/link-report-generator.py \
          --links links.json \
          --validation validation.json \
          --relevance relevance.json \
          --repairs reports/repairs.json \
          --output-dir reports

        # Ship links.json in the artifact too -- batch-link-fixer.py in the
        # repair-links job reads it from the working directory and crashes
        # without it (it hardcodes open('links.json')).
        cp links.json reports/links.json

    - name: Upload Reports
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
      with:
        name: link-validation-reports
        path: reports/

    - name: Check for Critical Issues
      id: check_critical
      run: |
        # Parse validation results for critical issues
        # Separate internal vs external link failures
        python -c "
        import json, os
        with open('validation.json', 'r') as f:
            data = json.load(f)

        results = data.get('results', [])
        total = len(results)

        # Separate internal (relative paths, same-domain) vs external links
        internal_broken = []
        external_broken = []
        for r in results:
            if r.get('status') == 'broken':
                url = r.get('url', '')
                if url.startswith('/') or url.startswith('#') or 'williamzujkowski' in url:
                    internal_broken.append(r)
                else:
                    external_broken.append(r)

        all_broken = len(internal_broken) + len(external_broken)
        broken_pct = (all_broken / total * 100) if total > 0 else 0

        print(f'Total links: {total}')
        print(f'Internal broken: {len(internal_broken)}')
        print(f'External broken: {len(external_broken)} (may be transient)')
        print(f'Overall: {all_broken}/{total} ({broken_pct:.1f}%)')

        # Set output for use in other steps
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'broken_count={all_broken}\n')
            f.write(f'total_count={total}\n')
            f.write(f'broken_percent={broken_pct:.1f}\n')
            f.write(f'internal_broken={len(internal_broken)}\n')
            f.write(f'external_broken={len(external_broken)}\n')

        event = os.environ.get('GITHUB_EVENT_NAME', '')
        is_pr = event == 'pull_request'

        # For PRs: only fail on internal broken links (> 5)
        # External failures are often transient (rate limits, timeouts)
        if is_pr:
            if len(internal_broken) > 5:
                print(f'ERROR: {len(internal_broken)} internal broken links')
                exit(1)
            elif len(external_broken) > 0:
                print(f'WARNING: {len(external_broken)} external links failed (non-blocking for PRs)')
        else:
            # For scheduled runs: warn but don't fail on external-only issues
            if len(internal_broken) > 5:
                print(f'ERROR: {len(internal_broken)} internal broken links')
                exit(1)
            elif broken_pct > 50:
                print(f'WARNING: High external failure rate ({broken_pct:.1f}%) - possible network issue')
        "

    - name: Create Issue for Broken Links
      if: failure() && github.event_name == 'schedule'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('reports/summary.md', 'utf8');

          const title = `🔗 Link Health Alert: ${process.env.broken_count} broken links found`;
          const body = `## Automated Link Health Check Failed\n\n` +
                `**Date:** ${new Date().toISOString()}\n` +
                `**Broken Links:** ${process.env.broken_count}/${process.env.total_count} (${process.env.broken_percent}%)\n\n` +
                `### Summary Report\n\n${report}\n\n` +
                `View full reports in the [workflow artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

          // Dedup guard: this job runs on the daily schedule trigger. Without
          // this check, a persistent breakage files a brand-new issue every
          // day instead of updating the existing tracking issue -- mirrors
          // the list-then-update pattern in citation-validation.yml.
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'automated,link-health'
          });

          if (issues.data.length > 0) {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issues.data[0].number,
              title: title,
              body: body
            });
            console.log(`Updated existing issue #${issues.data[0].number}`);
          } else {
            const newIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: 'automated,link-health'
            });
            console.log(`Created new issue #${newIssue.data.number}`);
          }
      env:
        broken_count: ${{ steps.check_critical.outputs.broken_count }}
        total_count: ${{ steps.check_critical.outputs.total_count }}
        broken_percent: ${{ steps.check_critical.outputs.broken_percent }}

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('reports/summary.md', 'utf8');

          // Extract key metrics
          const validation = JSON.parse(fs.readFileSync('validation.json', 'utf8'));
          const broken = validation.results.filter(r => r.status === 'broken').length;
          const total = validation.results.length;

          let emoji = '✅';
          let status = 'passed';
          if (broken > 0) {
            emoji = broken > 10 ? '❌' : '⚠️';
            status = broken > 10 ? 'failed' : 'warning';
          }

          // Create PR comment
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: `${emoji} **Link Validation Results**\n\n` +
                  `- **Total Links:** ${total}\n` +
                  `- **Broken Links:** ${broken}\n` +
                  `- **Status:** ${status}\n\n` +
                  `<details>\n<summary>View Full Report</summary>\n\n${summary}\n</details>`
          });

  repair-links:
    needs: check-links
    if: github.event.inputs.force_check == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # push the auto-fix branch
      pull-requests: write   # open the review PR

    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: '3.11'

    - name: Install UV
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

    - name: Install Dependencies
      run: |
        uv pip install --system --upgrade pip
        uv pip install --system "aiohttp>=3.13.3" "urllib3>=2.6.3"

    - name: Download Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
      with:
        name: link-validation-reports
        path: reports/

    - name: Apply High-Confidence Fixes
      run: |
        # Only apply fixes with >=95% confidence automatically. repairs.json
        # arrives inside the downloaded reports/ artifact.
        if [ -f "reports/repairs.json" ]; then
          # batch-link-fixer.py reads links.json from the working directory;
          # it travels inside the reports/ artifact (see check-links job).
          cp reports/links.json links.json
          uv run python scripts/link-validation/batch-link-fixer.py \
            --repairs reports/repairs.json \
            --confidence-threshold 95 \
            --apply \
            --posts-dir src/posts
        else
          echo "No repairs.json found; nothing to apply"
        fi

    - name: Open PR with fixes
      if: success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Open a PR for human review instead of pushing straight to main --
        # auto-repairs (redirect-follows, Wayback snapshots) must be eyeballed.
        if [[ -z "$(git status --porcelain src/posts)" ]]; then
          echo "No high-confidence fixes to apply"
          exit 0
        fi

        # Dedup guard: this job runs daily and each run uses a unique branch,
        # so without this check an unmerged repair PR gets a duplicate every
        # day until a human merges or closes it.
        OPEN_REPAIR_PRS=$(gh pr list --state open --json headRefName \
          --jq '[.[] | select(.headRefName | startswith("auto/link-repairs-"))] | length')
        if [[ "$OPEN_REPAIR_PRS" -gt 0 ]]; then
          echo "An auto/link-repairs PR is already open; skipping duplicate PR"
          exit 0
        fi

        BRANCH="auto/link-repairs-${GITHUB_RUN_ID}"
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git checkout -b "$BRANCH"
        # batch-link-fixer.py leaves .bak.TIMESTAMP safety copies beside the
        # posts -- stage only the markdown, and let git (not the shell) expand
        # the pathspec.
        git add -- 'src/posts/*.md'
        git commit -m "fix(links): auto-repair broken links (>=95% confidence)"
        git push origin "$BRANCH"

        gh pr create --base main --head "$BRANCH" \
          --title "🔗 Automated link repairs (review before merge)" \
          --body "High-confidence (>=95%) repairs for **provably dead** links (404/410/DNS), proposed by the Link Health Monitor via citation-repair.py (redirect-follow / Wayback). **Review before merging -- do not auto-merge.**"