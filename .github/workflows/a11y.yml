name: Accessibility (axe-playwright)

on:
  pull_request:
    branches: [main]
    paths: ['astro-site/**', 'src/**']
  push:
    branches: [main]
    paths: ['astro-site/**', 'src/**']

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  axe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: pnpm/action-setup@a0ea98b2dc7d387a59324835f7421c1d5f8357b4  # v6.0.5
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: astro-site/pnpm-lock.yaml
      - name: Install deps
        run: cd astro-site && pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        run: cd astro-site && pnpm exec playwright install --with-deps chromium
      - name: Build site
        run: cd astro-site && pnpm build
      - name: Run full Playwright suite (smoke + a11y + theme-deck)
        run: cd astro-site && npx playwright test tests/e2e/
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8  # v5
        with:
          name: axe-playwright-report
          path: astro-site/playwright-report/
          retention-days: 7
