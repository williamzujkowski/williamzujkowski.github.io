name: Accessibility (axe-playwright)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # Job-level path gating instead of workflow-level `paths:` triggers —
  # `remarque` is a REQUIRED branch-protection check, and trigger-filtered
  # workflows never report on non-matching PRs, wedging them as "expected"
  # forever. A skipped job still reports and satisfies protection.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      site: ${{ steps.diff.outputs.site }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0
      - id: diff
        env:
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "site=true" >> "$GITHUB_OUTPUT"   # can't diff: run everything
          elif git diff --name-only "$BASE"...HEAD | grep -qE '^(astro-site/|src/)'; then
            echo "site=true" >> "$GITHUB_OUTPUT"
          else
            echo "site=false" >> "$GITHUB_OUTPUT"
          fi

  axe:
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: astro-site/pnpm-lock.yaml
      - name: Install deps
        run: cd astro-site && pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        run: cd astro-site && pnpm exec playwright install --with-deps chromium
      - name: Build site
        run: cd astro-site && pnpm build
      - name: Run full Playwright suite (smoke + a11y + theme-deck)
        run: cd astro-site && npx playwright test tests/e2e/
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8  # v5
        with:
          name: axe-playwright-report
          path: astro-site/playwright-report/
          retention-days: 7
