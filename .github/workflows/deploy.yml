name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Prepare build environment
        run: |
          mkdir -p src/_includes
          cp _layouts/*.njk src/_includes/
          cp _includes/*.njk src/_includes/
          touch .nojekyll

      - name: Generate data files
        run: |
          node build-arxiv-feed.js
          node build-github-pins.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site
        run: npx @11ty/eleventy --config=.eleventy.simple.cjs

      - name: Build CSS
        run: |
          mkdir -p _site/css
          npx postcss src/css/styles.css -o _site/css/styles.css
          # Fallback - copy the original CSS file just in case PostCSS fails
          cp src/css/styles.css _site/css/styles.original.css

      - name: Debug output directory
        run: ls -la _site

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4