name: Compliance Monitoring

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - uses: pnpm/action-setup@a0ea98b2dc7d387a59324835f7421c1d5f8357b4  # v6.0.5
      with:
        version: 10

    - name: Use Node.js 22
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
      with:
        node-version: '22'
        cache: 'pnpm'
        cache-dependency-path: astro-site/pnpm-lock.yaml

    - name: Install dependencies
      run: cd astro-site && pnpm install --frozen-lockfile

    - name: Build site
      run: cd astro-site && pnpm run build
      continue-on-error: false

    # External link health is owned by link-monitor.yml (Python pipeline,
    # daily cron + per-PR trigger on src/posts/**). The previous lychee step
    # here scanned ./astro-site/src/**/*.md while the actual posts live at
    # ./src/posts/**, so it was finding nothing useful.

    - name: Run Lighthouse CI
      run: |
        cd astro-site
        npx serve -l 4321 dist &
        SERVER_PID=$!
        sleep 3
        npx lighthouse http://localhost:4321/ \
          --output=json --output=html \
          --output-path=../lighthouse-report \
          --chrome-flags="--headless --no-sandbox" \
          --only-categories=performance,accessibility,best-practices,seo || true
        kill $SERVER_PID 2>/dev/null || true
      continue-on-error: true
      timeout-minutes: 5

    - name: Validate HTML
      uses: cyb3r-jak3/html5validator-action@41633d488eb36e18fd1a95ffc83daf1bf22a75bd  # v7.2.0
      with:
        root: astro-site/dist/
        css: true
      continue-on-error: true

    # Accessibility is owned by a11y.yml (axe-playwright on every push/PR).
    # The previous duplicate axe step here ran the same tool on the same SHA.

    - name: Check citation coverage
      run: |
        echo "Checking citation coverage..."
        python3 -c "
        import os
        import re
        from pathlib import Path

        # Check both old src/posts and astro content directories
        post_dirs = [Path('src/posts')]
        total_posts = 0
        posts_with_citations = 0

        for posts_dir in post_dirs:
            if not posts_dir.exists():
                continue
            for post in posts_dir.glob('**/*.md'):
                total_posts += 1
                content = post.read_text()
                # Check for citation patterns
                if re.search(r'\[.*?\]\(https?://.*?\)', content) or \
                   re.search(r'\[.*?\]\(.*?doi\.org.*?\)', content) or \
                   re.search(r'\[.*?\]\(.*?arxiv\.org.*?\)', content):
                    posts_with_citations += 1

        coverage = (posts_with_citations / total_posts * 100) if total_posts > 0 else 0
        print(f'Citation Coverage: {coverage:.1f}% ({posts_with_citations}/{total_posts} posts)')

        if coverage < 70:
            print(f'WARNING: Citation coverage ({coverage:.1f}%) is below 70% target')
        "

    - name: Content compliance check
      run: |
        echo "Checking content compliance..."
        python3 -c "
        import os
        import re
        from pathlib import Path

        # Forbidden patterns for NDA compliance
        forbidden_patterns = [
            r'at work',
            r'my employer',
            r'our production',
            r'in production',
            r'recent incident',
            r'last week at',
            r'my team',
            r'our security team',
            r'government',
            r'agency',
            r'classified',
            r'sensitive',
            r'confidential'
        ]

        issues_found = []

        post_dirs = [Path('src/posts')]
        for posts_dir in post_dirs:
            if not posts_dir.exists():
                continue
            for post in posts_dir.glob('**/*.md'):
                content = post.read_text().lower()
                for pattern in forbidden_patterns:
                    if re.search(pattern, content, re.IGNORECASE):
                        issues_found.append(f'{post.name}: Found pattern \"{pattern}\"')

        if issues_found:
            print('Compliance Warnings Found:')
            for issue in issues_found:
                print(f'  - {issue}')
            print('Note: These are warnings only and do not fail the build')
        else:
            print('Content compliance check passed')
        "

    - name: Generate compliance report
      if: always()
      run: |
        echo "# Compliance Report" > compliance-report.md
        echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> compliance-report.md
        echo "" >> compliance-report.md
        echo "## Build Status" >> compliance-report.md
        echo "- Build: ${{ job.status }}" >> compliance-report.md
        echo "" >> compliance-report.md
        echo "## Checks Performed" >> compliance-report.md
        echo "- [x] Site build validation" >> compliance-report.md
        echo "- [x] Link checking (Lychee)" >> compliance-report.md
        echo "- [x] Lighthouse performance audit" >> compliance-report.md
        echo "- [x] Accessibility (axe-core)" >> compliance-report.md
        echo "- [x] HTML validation" >> compliance-report.md
        echo "- [x] Citation coverage" >> compliance-report.md
        echo "- [x] Content compliance" >> compliance-report.md

    - name: Upload compliance report
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
      with:
        name: compliance-report
        path: |
          compliance-report.md
          lighthouse-report*
        retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        # Full history: gitleaks scans commit ranges; a shallow checkout made
        # it scan ~0 bytes and error -- silently, until the step became blocking.
        fetch-depth: 0

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@256d634097be96e792d6764f9edaefc4320557b1  # v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

    - name: Run Gitleaks secret scan
      uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run pip-audit on Python dependencies
      run: |
        pip install pip-audit uv
        # requirements.txt was removed (duplicate of pyproject.toml) -- export
        # the locked runtime deps for pip-audit instead.
        uv export --no-dev --no-emit-project --format requirements-txt -o /tmp/requirements-audit.txt
        pip-audit -r /tmp/requirements-audit.txt --output pip-audit-results.json --format json || true
      continue-on-error: true

    - name: Upload security results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
      if: always()
      with:
        name: security-results
        path: |
          trivy-results.sarif
          pip-audit-results.json
        retention-days: 30
