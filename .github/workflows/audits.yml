name: Remarque Audits

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # Job-level path gating instead of workflow-level `paths:` triggers —
  # `remarque` is a REQUIRED branch-protection check, and trigger-filtered
  # workflows never report on non-matching PRs, wedging them as "expected"
  # forever. A skipped job still reports and satisfies protection.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      site: ${{ steps.diff.outputs.site }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - id: diff
        env:
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "site=true" >> "$GITHUB_OUTPUT"   # can't diff: run everything
          elif git diff --name-only "$BASE"...HEAD | grep -qE '^(astro-site/|src/)'; then
            echo "site=true" >> "$GITHUB_OUTPUT"
          else
            echo "site=false" >> "$GITHUB_OUTPUT"
          fi

  remarque:
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d  # v6.0.5
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: astro-site/pnpm-lock.yaml
      - name: Install deps (apca-w3 for the APCA audit)
        run: cd astro-site && pnpm install --frozen-lockfile
      - name: remarque-audit (WCAG AA / AAA / 1.4.11 contrast + sRGB gamut, via remarque-tokens@0.5.0)
        run: node astro-site/scripts/run-remarque-audit.mjs
      - name: Typography floor audit (USWDS 13px min)
        run: node astro-site/scripts/typography-audit.mjs
      - name: Color-token audit (no hardcoded hex/rgb/oklch outside tokens)
        run: node astro-site/scripts/color-token-audit.mjs
      - name: Accent-font audit (--font-accent restricted to .hand-note allowlist)
        run: node astro-site/scripts/accent-font-audit.mjs
      - name: APCA advisory (WCAG 3 draft — informational only)
        run: node astro-site/scripts/apca-audit.mjs
        continue-on-error: true
