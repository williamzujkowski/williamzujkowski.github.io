name: Remarque Audits

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # Job-level path gating instead of workflow-level `paths:` triggers —
  # `remarque` is a REQUIRED branch-protection check, and trigger-filtered
  # workflows never report on non-matching PRs, wedging them as "expected"
  # forever. A skipped job still reports and satisfies protection.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      site: ${{ steps.diff.outputs.site }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0
      - id: diff
        env:
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "site=true" >> "$GITHUB_OUTPUT"   # can't diff: run everything
          elif git diff --name-only "$BASE"...HEAD | grep -qE '^(astro-site/|src/)'; then
            echo "site=true" >> "$GITHUB_OUTPUT"
          else
            echo "site=false" >> "$GITHUB_OUTPUT"
          fi

  remarque:
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: astro-site/pnpm-lock.yaml
      - name: Install deps (apca-w3 for the APCA audit)
        run: cd astro-site && pnpm install --frozen-lockfile
      - name: remarque-audit (WCAG AA / AAA / 1.4.11 contrast + sRGB gamut, via remarque-tokens@0.5.0)
        run: node astro-site/scripts/run-remarque-audit.mjs
      - name: Typography floor audit (USWDS 13px min)
        run: node astro-site/scripts/typography-audit.mjs
      - name: Color-token audit (no hardcoded hex/rgb/oklch outside tokens)
        run: node astro-site/scripts/color-token-audit.mjs
      - name: Accent-font audit (--font-accent restricted to .hand-note allowlist)
        run: node astro-site/scripts/accent-font-audit.mjs
      - name: APCA advisory (WCAG 3 draft — informational only)
        run: node astro-site/scripts/apca-audit.mjs
        continue-on-error: true

  # Type-check + lint gate (#356). `pnpm build` alone runs neither `astro
  # check`/tsc diagnostics nor eslint, so a real type error or lint violation
  # in an ordinary content/code PR would pass CI green — the exact blind spot
  # that made "CI green" insufficient for the TypeScript-6 (#347) and
  # eslint-plugin-astro-3 (#346) major bumps. Both pass clean today (0 errors;
  # astro check reports only hints, eslint only the pre-existing set:html
  # warning — neither fails the run), so this gates on genuine regressions.
  check-lint:
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: astro-site/pnpm-lock.yaml
      - name: Install deps
        run: cd astro-site && pnpm install --frozen-lockfile
      - name: Type-check (astro check — tsc diagnostics across .astro/.ts/.svelte)
        run: cd astro-site && pnpm check
      - name: Lint (eslint)
        run: cd astro-site && pnpm lint

  # Token-drift check against the installed remarque-tokens package
  # (remarque#47/#48 — consensus-armed now that 2+ sites consume the
  # package from npm; this site is #1, tsundoku is #2). Calls remarque's
  # reusable workflow directly rather than a plain `npx remarque-drift`
  # step: remarque-drift isn't published to npm yet (it lands with a
  # future remarque-tokens release), so `remarque-ref` pins this call to
  # the feature branch that adds it (williamzujkowski/remarque#71). Once
  # that release ships, drop `remarque-ref` and repoint `@main`
  # at a released tag — no other change needed.
  #
  # Our one core-tier deviation (--text-display, documented in
  # DESIGN-DEVIATIONS.md, ratified in issue #274) is expected to
  # classify as WARN, not FAIL — verified locally, see this PR's body.
  token-drift:
    needs: changes
    if: needs.changes.outputs.site == 'true'
    uses: williamzujkowski/remarque/.github/workflows/token-drift.yml@main
    permissions:
      contents: read
    with:
      css-file: astro-site/src/styles/global.css
      package-dir: astro-site
      remarque-ref: main
