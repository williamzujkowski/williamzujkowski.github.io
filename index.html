<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to My Website - William Zujkowski</title>
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>
    <!-- Header with ARIA role -->
    <header role="banner">
        <nav role="navigation" aria-label="Main Navigation" id="dynamic-nav"></nav>
    </header>

    <main role="main">
        <!-- Hero Section -->
        <section class="hero" aria-labelledby="hero-heading">
            <h1 id="hero-heading">Welcome to My Website!</h1>
            <img src="assets/images/simpson_profile.png" alt="Cartoon-style portrait of me, William Zujkowski" />
            <div class="hero-content">
                <p>
                    I’m William Zujkowski—a software engineer and tech enthusiast. I built this site to share my
                    projects,
                    blog posts, and the occasional coding-related calculator or experiment. Feel free to explore!
                </p>
            </div>
        </section>

        <!-- Recent Blog Posts Section -->
        <section class="blog-summaries" aria-labelledby="recent-posts-heading">
            <h2 id="recent-posts-heading">Recent Blog Posts</h2>
            <ul id="blog-summaries-list" aria-live="polite"></ul>
        </section>
    </main>

    <footer role="contentinfo" id="dynamic-footer"></footer>

    <!-- Main script -->
    <script src="js/main.js"></script>
</body>

</html>
