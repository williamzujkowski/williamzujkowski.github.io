<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>

  <!-- Paperclip factory -->
  <g transform="translate(400, 200)">
    <!-- Factory building -->
    <rect x="-150" y="-50" width="300" height="150" fill="#3b4150"/>
    <rect x="-160" y="-60" width="320" height="20" fill="#a3aab3"/>

    <!-- Factory windows -->
    <rect x="-130" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>
    <rect x="-100" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>
    <rect x="-70" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>
    <rect x="-40" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>
    <rect x="-10" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>
    <rect x="20" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>
    <rect x="50" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>
    <rect x="80" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>
    <rect x="110" y="-30" width="20" height="30" fill="#79c0ff" opacity="0.7"/>

    <!-- Factory door -->
    <rect x="-20" y="60" width="40" height="40" fill="#1e1e2e"/>

    <!-- Smokestacks -->
    <rect x="-100" y="-80" width="20" height="30" fill="#3b4150"/>
    <rect x="80" y="-80" width="20" height="30" fill="#3b4150"/>

    <!-- Smoke -->
    <circle cx="-90" cy="-90" r="10" fill="#a3aab3" opacity="0.6"/>
    <circle cx="-95" cy="-100" r="12" fill="#a3aab3" opacity="0.5"/>
    <circle cx="-85" cy="-110" r="15" fill="#a3aab3" opacity="0.4"/>

    <circle cx="90" cy="-90" r="10" fill="#a3aab3" opacity="0.6"/>
    <circle cx="95" cy="-100" r="12" fill="#a3aab3" opacity="0.5"/>
    <circle cx="85" cy="-110" r="15" fill="#a3aab3" opacity="0.4"/>
  </g>

  <!-- Conveyor belt -->
  <rect x="100" y="210" width="600" height="10" fill="#a3aab3"/>
  <rect x="100" y="220" width="600" height="5" fill="#3b4150"/>

  <!-- Paperclips on conveyor -->
  <g fill="none" stroke="#79c0ff" stroke-width="3">
    <!-- Paperclip 1 -->
    <path d="M170,190 C160,190 160,200 170,200 L210,200 C220,200 220,190 210,190" />

    <!-- Paperclip 2 -->
    <path d="M270,190 C260,190 260,200 270,200 L310,200 C320,200 320,190 310,190" />

    <!-- Paperclip 3 -->
    <path d="M370,190 C360,190 360,200 370,200 L410,200 C420,200 420,190 410,190" />

    <!-- Paperclip 4 -->
    <path d="M470,190 C460,190 460,200 470,200 L510,200 C520,200 520,190 510,190" />

    <!-- Paperclip 5 -->
    <path d="M570,190 C560,190 560,200 570,200 L610,200 C620,200 620,190 610,190" />
  </g>

  <!-- AI robot arm -->
  <g transform="translate(650, 150)">
    <rect x="-10" y="-80" width="20" height="80" fill="#e5c07b"/>
    <rect x="-30" y="-100" width="60" height="20" fill="#e5c07b"/>
    <rect x="-25" y="-95" width="50" height="10" fill="#1e1e2e"/>

    <!-- Robot arm joint -->
    <circle cx="0" cy="0" r="15" fill="#a3aab3"/>
    <circle cx="0" cy="0" r="5" fill="#1e1e2e"/>

    <!-- Robot gripper -->
    <path d="M0,0 L30,30 L40,20 L10,-10 Z" fill="#e5c07b"/>
    <path d="M0,0 L30,30 M40,20 L10,-10" stroke="#a3aab3" stroke-width="2" fill="none"/>
  </g>

  <!-- AI brain visualization -->
  <g transform="translate(700, 80)">
    <circle cx="0" cy="0" r="40" fill="#1e1e2e" stroke="#c678dd" stroke-width="2"/>

    <!-- Neural network nodes -->
    <g fill="#79c0ff">
      <circle cx="-20" cy="-15" r="3"/>
      <circle cx="-10" cy="-20" r="3"/>
      <circle cx="0" cy="-25" r="3"/>
      <circle cx="10" cy="-20" r="3"/>
      <circle cx="20" cy="-15" r="3"/>

      <circle cx="-15" cy="0" r="3"/>
      <circle cx="0" cy="0" r="3"/>
      <circle cx="15" cy="0" r="3"/>

      <circle cx="-20" cy="15" r="3"/>
      <circle cx="-10" cy="20" r="3"/>
      <circle cx="0" cy="25" r="3"/>
      <circle cx="10" cy="20" r="3"/>
      <circle cx="20" cy="15" r="3"/>
    </g>

    <!-- Neural connections -->
    <g stroke="#c678dd" stroke-width="1">
      <!-- Layer 1 to 2 connections -->
      <line x1="-20" y1="-15" x2="-15" y2="0"/>
      <line x1="-20" y1="-15" x2="0" y2="0"/>
      <line x1="-20" y1="-15" x2="15" y2="0"/>

      <line x1="-10" y1="-20" x2="-15" y2="0"/>
      <line x1="-10" y1="-20" x2="0" y2="0"/>
      <line x1="-10" y1="-20" x2="15" y2="0"/>

      <line x1="0" y1="-25" x2="-15" y2="0"/>
      <line x1="0" y1="-25" x2="0" y2="0"/>
      <line x1="0" y1="-25" x2="15" y2="0"/>

      <line x1="10" y1="-20" x2="-15" y2="0"/>
      <line x1="10" y1="-20" x2="0" y2="0"/>
      <line x1="10" y1="-20" x2="15" y2="0"/>

      <line x1="20" y1="-15" x2="-15" y2="0"/>
      <line x1="20" y1="-15" x2="0" y2="0"/>
      <line x1="20" y1="-15" x2="15" y2="0"/>

      <!-- Layer 2 to 3 connections -->
      <line x1="-15" y1="0" x2="-20" y2="15"/>
      <line x1="-15" y1="0" x2="-10" y2="20"/>
      <line x1="-15" y1="0" x2="0" y2="25"/>
      <line x1="-15" y1="0" x2="10" y2="20"/>
      <line x1="-15" y1="0" x2="20" y2="15"/>

      <line x1="0" y1="0" x2="-20" y2="15"/>
      <line x1="0" y1="0" x2="-10" y2="20"/>
      <line x1="0" y1="0" x2="0" y2="25"/>
      <line x1="0" y1="0" x2="10" y2="20"/>
      <line x1="0" y1="0" x2="20" y2="15"/>

      <line x1="15" y1="0" x2="-20" y2="15"/>
      <line x1="15" y1="0" x2="-10" y2="20"/>
      <line x1="15" y1="0" x2="0" y2="25"/>
      <line x1="15" y1="0" x2="10" y2="20"/>
      <line x1="15" y1="0" x2="20" y2="15"/>
    </g>
  </g>

  <!-- Counter display -->
  <g transform="translate(200, 100)">
    <rect x="-80" y="-30" width="160" height="60" rx="5" fill="#3b4150"/>
    <rect x="-75" y="-25" width="150" height="50" rx="3" fill="#1e1e2e"/>

    <!-- Counter number -->
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="24" fill="#e5c07b">1,283,457</text>

    <!-- Counter label -->
    <text x="0" y="-35" text-anchor="middle" font-family="Arial" font-size="14" fill="#a3aab3">PAPERCLIPS</text>
  </g>

  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">Paperclip AI Game</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">Maximize paperclip production</text>
</svg>
