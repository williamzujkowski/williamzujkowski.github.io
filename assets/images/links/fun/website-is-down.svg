<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>
  
  <!-- Computer screen with error -->
  <g transform="translate(400, 200)">
    <!-- Computer monitor -->
    <rect x="-150" y="-100" width="300" height="200" rx="5" fill="#3b4150"/>
    <rect x="-140" y="-90" width="280" height="160" fill="#1e1e2e"/>
    
    <!-- Monitor stand -->
    <rect x="-30" y="100" width="60" height="10" fill="#3b4150"/>
    <rect x="-40" y="110" width="80" height="5" fill="#3b4150"/>
    
    <!-- Error screen -->
    <g>
      <!-- Blue screen of death -->
      <rect x="-139" y="-89" width="278" height="158" fill="#1d4ed8"/>
      
      <!-- Error message -->
      <text x="0" y="-50" text-anchor="middle" font-family="monospace" font-size="16" fill="white">ERROR 404</text>
      <text x="0" y="-20" text-anchor="middle" font-family="monospace" font-size="14" fill="white">Website Not Found</text>
      <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="12" fill="white">The website you are looking for</text>
      <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="12" fill="white">might be down or does not exist.</text>
      
      <!-- Sad face emoticon -->
      <text x="0" y="70" text-anchor="middle" font-family="monospace" font-size="24" fill="white">:(</text>
    </g>
  </g>
  
  <!-- Frazzled IT person -->
  <g transform="translate(620, 250)">
    <!-- Head -->
    <circle cx="0" cy="-50" r="25" fill="#e5c07b"/>
    
    <!-- Hair -->
    <path d="M-20,-60 L-25,-70 L-15,-65 L-10,-75 L-5,-65 L5,-75 L10,-65 L20,-75 L15,-65 L25,-70 L20,-60" fill="#3b4150"/>
    
    <!-- Face -->
    <circle cx="-10" cy="-55" r="3" fill="#1e1e2e"/>
    <circle cx="10" cy="-55" r="3" fill="#1e1e2e"/>
    <path d="M-10,-40 C-5,-35 5,-35 10,-40" stroke="#1e1e2e" stroke-width="2" fill="none"/>
    
    <!-- Body -->
    <rect x="-20" y="-25" width="40" height="50" rx="5" fill="#56b6c2"/>
    
    <!-- Arms up in frustration -->
    <path d="M-20,-10 L-50,-40" stroke="#e5c07b" stroke-width="10" stroke-linecap="round"/>
    <path d="M20,-10 L50,-40" stroke="#e5c07b" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Legs -->
    <rect x="-15" y="25" width="10" height="40" fill="#3b4150"/>
    <rect x="5" y="25" width="10" height="40" fill="#3b4150"/>
  </g>
  
  <!-- Server on fire -->
  <g transform="translate(180, 250)">
    <!-- Server rack -->
    <rect x="-40" y="-70" width="80" height="120" fill="#3b4150"/>
    
    <!-- Server units -->
    <rect x="-35" y="-65" width="70" height="20" fill="#1e1e2e"/>
    <rect x="-35" y="-40" width="70" height="20" fill="#1e1e2e"/>
    <rect x="-35" y="-15" width="70" height="20" fill="#1e1e2e"/>
    <rect x="-35" y="10" width="70" height="20" fill="#1e1e2e"/>
    <rect x="-35" y="35" width="70" height="10" fill="#1e1e2e"/>
    
    <!-- Server lights -->
    <circle cx="-25" cy="-55" r="3" fill="#e86671"/>
    <circle cx="-15" cy="-55" r="3" fill="#e86671"/>
    <circle cx="-25" cy="-30" r="3" fill="#e86671"/>
    <circle cx="-15" cy="-30" r="3" fill="#e5c07b"/>
    <circle cx="-25" cy="-5" r="3" fill="#e86671"/>
    <circle cx="-15" cy="-5" r="3" fill="#e86671"/>
    <circle cx="-25" cy="20" r="3" fill="#e86671"/>
    <circle cx="-15" cy="20" r="3" fill="#e86671"/>
    
    <!-- Fire -->
    <path d="M-40,-80 C-45,-100 -25,-110 -20,-90 C-15,-110 0,-100 -5,-80 Z" fill="#e5c07b"/>
    <path d="M-30,-90 C-35,-105 -20,-115 -15,-100 C-10,-115 0,-105 -5,-90 Z" fill="#e86671"/>
    
    <!-- Smoke -->
    <circle cx="-20" cy="-120" r="10" fill="#a3aab3" opacity="0.6"/>
    <circle cx="-30" cy="-130" r="12" fill="#a3aab3" opacity="0.5"/>
    <circle cx="-15" cy="-145" r="15" fill="#a3aab3" opacity="0.4"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">The Website Is Down</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">Hilarious IT videos</text>
</svg>