<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>

  <!-- Digital grid background -->
  <g stroke="#a3aab3" stroke-width="0.5" opacity="0.2">
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>

    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Digital culture elements -->
  <!-- Desktop interface -->
  <g transform="translate(200, 150)">
    <rect x="-80" y="-60" width="160" height="120" rx="5" fill="#3b4150"/>
    <rect x="-75" y="-55" width="150" height="110" rx="3" fill="#1e1e2e"/>
    <rect x="-75" y="-55" width="150" height="15" fill="#79c0ff"/>
    <circle cx="60" cy="-47.5" r="3.5" fill="#e86671"/>
    <circle cx="50" cy="-47.5" r="3.5" fill="#e5c07b"/>
    <circle cx="40" cy="-47.5" r="3.5" fill="#2ea043"/>

    <!-- Window content -->
    <rect x="-65" y="-30" width="40" height="75" rx="2" fill="#3b4150"/>
    <rect x="-15" y="-30" width="80" height="40" rx="2" fill="#3b4150"/>
    <rect x="-15" y="20" width="35" height="25" rx="2" fill="#3b4150"/>
    <rect x="30" y="20" width="35" height="25" rx="2" fill="#3b4150"/>
  </g>

  <!-- Chat/social media bubble -->
  <g transform="translate(500, 200)">
    <path d="M-70,-50 C-80,-50 -90,-40 -90,-30 L-90,30 C-90,40 -80,50 -70,50 L50,50 C60,50 70,40 70,30 L70,-30 C70,-40 60,-50 50,-50 L-70,-50 Z" fill="#3b4150"/>
    <rect x="-70" y="-35" width="125" height="10" rx="5" fill="#79c0ff"/>
    <rect x="-70" y="-15" width="90" height="10" rx="5" fill="#a3aab3"/>
    <rect x="-70" y="5" width="110" height="10" rx="5" fill="#a3aab3"/>
    <rect x="-70" y="25" width="80" height="10" rx="5" fill="#a3aab3"/>
  </g>

  <!-- Connected nodes -->
  <g>
    <circle cx="150" cy="350" r="12" fill="#2ea043"/>
    <circle cx="270" cy="320" r="12" fill="#79c0ff"/>
    <circle cx="350" cy="370" r="12" fill="#e5c07b"/>
    <circle cx="430" cy="330" r="12" fill="#e86671"/>
    <circle cx="530" cy="350" r="12" fill="#c678dd"/>
    <circle cx="650" cy="380" r="12" fill="#56b6c2"/>

    <line x1="150" y1="350" x2="270" y2="320" stroke="#a3aab3" stroke-width="2"/>
    <line x1="270" y1="320" x2="350" y2="370" stroke="#a3aab3" stroke-width="2"/>
    <line x1="350" y1="370" x2="430" y2="330" stroke="#a3aab3" stroke-width="2"/>
    <line x1="430" y1="330" x2="530" y2="350" stroke="#a3aab3" stroke-width="2"/>
    <line x1="530" y1="350" x2="650" y2="380" stroke="#a3aab3" stroke-width="2"/>
    <line x1="150" y1="350" x2="350" y2="370" stroke="#a3aab3" stroke-width="1"/>
    <line x1="270" y1="320" x2="430" y2="330" stroke="#a3aab3" stroke-width="1"/>
    <line x1="350" y1="370" x2="530" y2="350" stroke="#a3aab3" stroke-width="1"/>
    <line x1="430" y1="330" x2="650" y2="380" stroke="#a3aab3" stroke-width="1"/>
  </g>

  <!-- Digital cultural icons -->
  <g transform="translate(630, 130)">
    <rect x="-25" y="-25" width="50" height="50" rx="25" fill="#3b4150"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="30" fill="#79c0ff">@</text>
  </g>

  <g transform="translate(140, 120)">
    <rect x="-20" y="-20" width="40" height="40" rx="5" fill="#3b4150"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="30" fill="#e5c07b">#</text>
  </g>

  <!-- Title -->
  <text x="400" y="70" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">Digital Culture</text>
  <text x="400" y="110" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">Exploring technology and society</text>
</svg>
