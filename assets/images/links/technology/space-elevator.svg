<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>

  <!-- Stars background -->
  <g fill="white">
    <circle cx="50" cy="50" r="1"/>
    <circle cx="120" cy="80" r="1.5"/>
    <circle cx="200" cy="40" r="1"/>
    <circle cx="280" cy="70" r="1.2"/>
    <circle cx="350" cy="30" r="1"/>
    <circle cx="430" cy="60" r="1.5"/>
    <circle cx="500" cy="40" r="1"/>
    <circle cx="580" cy="80" r="1.2"/>
    <circle cx="650" cy="50" r="1"/>
    <circle cx="730" cy="30" r="1.5"/>
    <circle cx="100" cy="120" r="1"/>
    <circle cx="170" cy="150" r="1.2"/>
    <circle cx="250" cy="110" r="1"/>
    <circle cx="330" cy="140" r="1.5"/>
    <circle cx="400" cy="100" r="1"/>
    <circle cx="480" cy="130" r="1.2"/>
    <circle cx="550" cy="110" r="1"/>
    <circle cx="630" cy="150" r="1.5"/>
    <circle cx="700" cy="120" r="1"/>
    <circle cx="770" cy="100" r="1.2"/>
  </g>

  <!-- Earth -->
  <circle cx="400" cy="500" r="300" fill="#1d4ed8"/>
  <path d="M200,350 Q300,320 350,370 Q420,410 500,380 Q580,340 650,390" fill="none" stroke="#2ea043" stroke-width="2"/>
  <path d="M250,330 Q330,310 400,340 Q470,370 550,350 Q600,320 700,370" fill="none" stroke="#2ea043" stroke-width="2"/>

  <!-- Space Elevator Cable -->
  <line x1="400" y1="200" x2="400" y2="10" stroke="#79c0ff" stroke-width="4"/>

  <!-- Elevator Climber -->
  <g transform="translate(400,150)">
    <rect x="-15" y="-20" width="30" height="40" fill="#a3aab3"/>
    <rect x="-10" y="-15" width="20" height="30" fill="#1e1e2e"/>
    <circle cx="0" cy="-5" r="5" fill="#2ea043"/>
  </g>

  <!-- Space Station -->
  <g transform="translate(400,10)">
    <rect x="-80" y="-5" width="160" height="10" fill="#a3aab3"/>
    <rect x="-20" y="-15" width="40" height="30" fill="#a3aab3"/>
    <rect x="-70" y="-3" width="140" height="6" fill="#79c0ff"/>
    <circle cx="-60" cy="0" r="8" fill="#a3aab3"/>
    <circle cx="60" cy="0" r="8" fill="#a3aab3"/>
    <rect x="-15" y="-10" width="30" height="20" fill="#1e1e2e"/>
  </g>

  <!-- Sun -->
  <circle cx="700" cy="80" r="40" fill="#e5c07b"/>
  <g stroke="#e5c07b" stroke-width="2">
    <line x1="700" y1="25" x2="700" y2="10" />
    <line x1="700" y1="150" x2="700" y2="135" />
    <line x1="645" y1="80" x2="630" y2="80" />
    <line x1="770" y1="80" x2="755" y2="80" />
    <line x1="660" y1="40" x2="650" y2="30" />
    <line x1="740" y1="120" x2="750" y2="130" />
    <line x1="660" y1="120" x2="650" y2="130" />
    <line x1="740" y1="40" x2="750" y2="30" />
  </g>

  <!-- Title -->
  <text x="400" y="320" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">Space Elevator Consortium</text>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">Revolutionizing space travel</text>
</svg>
