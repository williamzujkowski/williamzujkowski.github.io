<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>

  <!-- Background cell tower signal waves -->
  <g stroke="#2ea043" stroke-width="2" fill="none" opacity="0.4">
    <circle cx="160" cy="140" r="35"/>
    <circle cx="160" cy="140" r="55"/>
    <circle cx="160" cy="140" r="75"/>
    <circle cx="160" cy="140" r="95"/>
  </g>
  
  <!-- Mobile tower -->
  <g transform="translate(160, 140)">
    <rect x="-5" y="-80" width="10" height="80" fill="#a3aab3"/>
    <rect x="-20" y="-95" width="40" height="15" fill="#a3aab3"/>
    <rect x="-25" y="-120" width="50" height="25" fill="#79c0ff"/>
    <rect x="-15" y="-130" width="30" height="10" fill="#a3aab3"/>
    <rect x="-2" y="-145" width="4" height="15" fill="#a3aab3"/>
    <circle cx="0" cy="0" r="15" fill="#2ea043"/>
  </g>
  
  <!-- Phone with signal -->
  <g transform="translate(300, 200)">
    <rect x="-15" y="-30" width="30" height="60" rx="3" fill="#a3aab3"/>
    <rect x="-12" y="-27" width="24" height="42" fill="#1e1e2e"/>
    <circle cx="0" cy="20" r="3" fill="#a3aab3"/>
    
    <!-- Signal bars -->
    <rect x="-8" y="-20" width="3" height="5" fill="#2ea043"/>
    <rect x="-4" y="-24" width="3" height="9" fill="#2ea043"/>
    <rect x="0" y="-28" width="3" height="13" fill="#2ea043"/>
    <rect x="4" y="-32" width="3" height="17" fill="#2ea043"/>
  </g>
  
  <!-- Router/Server -->
  <g transform="translate(450, 150)">
    <rect x="-40" y="-20" width="80" height="40" fill="#a3aab3"/>
    <rect x="-35" y="-15" width="70" height="30" fill="#1e1e2e"/>
    <circle cx="-25" cy="5" r="3" fill="#2ea043"/>
    <circle cx="-15" cy="5" r="3" fill="#79c0ff"/>
    <rect x="-30" y="-10" width="60" height="12" fill="#79c0ff" opacity="0.7"/>
  </g>
  
  <!-- Connection lines -->
  <line x1="180" y1="140" x2="290" y2="200" stroke="#2ea043" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="315" y1="200" x2="410" y2="150" stroke="#79c0ff" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="490" y1="150" x2="600" y2="180" stroke="#79c0ff" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Cloud server -->
  <g transform="translate(600, 180)">
    <path d="M-30,-15 C-40,-30 -10,-40 0,-25 C10,-40 40,-30 30,-15 C45,-10 40,15 25,15 C25,20 -25,20 -25,15 C-40,15 -45,-10 -30,-15" fill="#a3aab3"/>
    <text x="-15" y="5" font-family="Arial" font-size="12" fill="#1e1e2e">LTE</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">Build Your Own LTE Network</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">DIY cellular networking</text>
</svg>