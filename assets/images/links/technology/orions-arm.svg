<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>
  
  <!-- Stars background -->
  <g fill="#a3aab3" opacity="0.8">
    <circle cx="100" cy="70" r="1"/>
    <circle cx="200" cy="150" r="1.2"/>
    <circle cx="300" cy="90" r="1"/>
    <circle cx="350" cy="200" r="1.5"/>
    <circle cx="450" cy="100" r="1"/>
    <circle cx="550" cy="180" r="1.2"/>
    <circle cx="650" cy="120" r="1"/>
    <circle cx="750" cy="70" r="1.5"/>
    <circle cx="70" cy="220" r="1"/>
    <circle cx="160" cy="310" r="1.2"/>
    <circle cx="240" cy="250" r="1"/>
    <circle cx="370" cy="270" r="1.5"/>
    <circle cx="420" cy="190" r="1"/>
    <circle cx="530" cy="230" r="1.2"/>
    <circle cx="630" cy="300" r="1"/>
    <circle cx="710" cy="240" r="1.5"/>
    <!-- and many more stars... -->
  </g>
  
  <!-- Nebula clouds -->
  <g opacity="0.3">
    <ellipse cx="250" cy="150" rx="100" ry="70" fill="#c678dd"/>
    <ellipse cx="550" cy="200" rx="150" ry="100" fill="#56b6c2"/>
    <ellipse cx="380" cy="100" rx="120" ry="60" fill="#e86671"/>
  </g>
  
  <!-- Central galactic hub -->
  <g transform="translate(400, 220)">
    <ellipse cx="0" cy="0" rx="180" ry="40" fill="#1d4ed8" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="150" ry="35" fill="#2ea043" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="120" ry="30" fill="#79c0ff" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="90" ry="25" fill="#e5c07b" opacity="0.4"/>
  </g>
  
  <!-- Advanced AI nodes -->
  <g>
    <circle cx="320" cy="170" r="10" fill="#79c0ff"/>
    <circle cx="490" cy="190" r="8" fill="#2ea043"/>
    <circle cx="360" cy="250" r="7" fill="#e5c07b"/>
    <circle cx="450" cy="240" r="9" fill="#e86671"/>
    <circle cx="410" cy="180" r="6" fill="#c678dd"/>
  </g>
  
  <!-- Connecting lines between AI nodes -->
  <g stroke="#a3aab3" stroke-width="1" opacity="0.6">
    <line x1="320" y1="170" x2="410" y2="180"/>
    <line x1="410" y1="180" x2="490" y2="190"/>
    <line x1="410" y1="180" x2="360" y2="250"/>
    <line x1="410" y1="180" x2="450" y2="240"/>
    <line x1="360" y1="250" x2="450" y2="240"/>
    <line x1="490" y1="190" x2="450" y2="240"/>
  </g>
  
  <!-- Solar system with advanced megastructure -->
  <g transform="translate(120, 350)">
    <circle cx="0" cy="0" r="15" fill="#e5c07b"/> <!-- Star -->
    <circle cx="40" cy="0" r="4" fill="#a3aab3"/> <!-- Planet -->
    <path d="M-10,-30 L10,-30 L20,-15 L10,0 L-10,0 L-20,-15 Z" fill="#79c0ff"/> <!-- Alien structure -->
  </g>
  
  <!-- Dyson structure -->
  <g transform="translate(650, 120)">
    <circle cx="0" cy="0" r="12" fill="#e5c07b"/>
    <g fill="none" stroke="#a3aab3" stroke-width="1">
      <circle cx="0" cy="0" r="25"/>
      <circle cx="0" cy="0" r="35" stroke-dasharray="2,4"/>
    </g>
    <g fill="#a3aab3">
      <circle cx="0" cy="-25" r="3"/>
      <circle cx="25" cy="0" r="3"/>
      <circle cx="0" cy="25" r="3"/>
      <circle cx="-25" cy="0" r="3"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">Orion's Arm Universe</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">A future of advanced technologies and AI</text>
</svg>