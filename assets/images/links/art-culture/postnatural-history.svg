<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>
  
  <!-- Museum backdrop -->
  <rect x="100" y="50" width="600" height="300" fill="#3b4150" rx="5"/>
  <rect x="120" y="70" width="560" height="260" fill="#1e1e2e" rx="3"/>
  
  <!-- Display shelves -->
  <rect x="150" y="280" width="500" height="10" fill="#a3aab3"/>
  <rect x="150" y="170" width="500" height="10" fill="#a3aab3"/>
  
  <!-- Genetically modified organisms in display cases -->
  
  <!-- Display case 1: Modified plant -->
  <g transform="translate(200, 225)">
    <rect x="-30" y="-50" width="60" height="100" fill="#3b4150" opacity="0.5"/>
    
    <!-- Genetically modified plant -->
    <path d="M0,-40 C-5,-35 -10,-30 -5,-25 C-15,-20 -15,-10 -5,-5 C-15,0 -15,10 -5,15 M0,-40 C5,-35 10,-30 5,-25 C15,-20 15,-10 5,-5 C15,0 15,10 5,15" stroke="#2ea043" stroke-width="2" fill="none"/>
    <path d="M0,-40 L0,40" stroke="#a3aab3" stroke-width="2" fill="none"/>
    <path d="M-5,15 C-3,20 0,25 0,40 M5,15 C3,20 0,25 0,40" stroke="#2ea043" stroke-width="1" fill="none"/>
    
    <!-- DNA modification indicator -->
    <path d="M-15,-15 L15,-5" stroke="#79c0ff" stroke-width="2" stroke-dasharray="2,2"/>
    <circle cx="-15" cy="-15" r="3" fill="#79c0ff"/>
    <circle cx="15" cy="-5" r="3" fill="#79c0ff"/>
  </g>
  
  <!-- Display case 2: Modified insect -->
  <g transform="translate(350, 225)">
    <rect x="-30" y="-50" width="60" height="100" fill="#3b4150" opacity="0.5"/>
    
    <!-- Genetically modified insect -->
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#e5c07b"/>
    <!-- Wings -->
    <path d="M0,-5 C10,-20 20,-10 15,0 M0,-5 C-10,-20 -20,-10 -15,0" stroke="#a3aab3" stroke-width="1" fill="none"/>
    <!-- Legs -->
    <path d="M-10,3 L-20,10 M-5,5 L-10,15 M5,5 L10,15 M10,3 L20,10" stroke="#e5c07b" stroke-width="1"/>
    <!-- Antennae -->
    <path d="M-5,-8 L-10,-20 M5,-8 L10,-20" stroke="#e5c07b" stroke-width="1"/>
    
    <!-- DNA modification indicator -->
    <path d="M-15,10 L15,15" stroke="#79c0ff" stroke-width="2" stroke-dasharray="2,2"/>
    <circle cx="-15" cy="10" r="3" fill="#79c0ff"/>
    <circle cx="15" cy="15" r="3" fill="#79c0ff"/>
  </g>
  
  <!-- Display case 3: Modified microorganism -->
  <g transform="translate(500, 225)">
    <rect x="-30" y="-50" width="60" height="100" fill="#3b4150" opacity="0.5"/>
    
    <!-- Genetically modified microorganism -->
    <circle cx="0" cy="0" r="20" fill="#c678dd" opacity="0.3"/>
    <path d="M-10,-10 L10,10 M-10,10 L10,-10" stroke="#c678dd" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#c678dd" stroke-width="1"/>
    
    <!-- DNA modification indicator -->
    <path d="M-20,0 L20,0" stroke="#79c0ff" stroke-width="2" stroke-dasharray="2,2"/>
    <circle cx="-20" cy="0" r="3" fill="#79c0ff"/>
    <circle cx="20" cy="0" r="3" fill="#79c0ff"/>
  </g>
  
  <!-- Display case 4: Modified mammal/chimera -->
  <g transform="translate(350, 125)">
    <rect x="-30" y="-50" width="60" height="100" fill="#3b4150" opacity="0.5"/>
    
    <!-- Genetically modified mammal silhouette -->
    <path d="M-15,25 C-20,20 -20,10 -15,0 C-10,-5 0,-10 5,-10 C10,-10 15,-5 15,0 C20,0 20,5 15,10 C15,15 10,20 5,25 z" fill="#e86671"/>
    <ellipse cx="-5" cy="0" rx="3" ry="5" fill="#1e1e2e"/>
    <path d="M15,0 C20,-10 30,-5 20,5 z" fill="#e86671"/>
    
    <!-- DNA modification indicator -->
    <path d="M-20,-20 L20,-20" stroke="#79c0ff" stroke-width="2" stroke-dasharray="2,2"/>
    <circle cx="-20" cy="-20" r="3" fill="#79c0ff"/>
    <circle cx="20" cy="-20" r="3" fill="#79c0ff"/>
  </g>
  
  <!-- DNA double helix -->
  <g transform="translate(650, 170)">
    <path d="M-30,100 C-20,80 20,70 30,50 C20,30 -20,20 -30,0 C-20,-20 20,-30 30,-50" stroke="#2ea043" stroke-width="2" fill="none"/>
    <path d="M-30,50 C-20,70 20,80 30,100 C20,120 -20,130 -30,150 C-20,170 20,180 30,200" stroke="#79c0ff" stroke-width="2" fill="none"/>
    
    <!-- Base pairs -->
    <line x1="-20" y1="85" x2="20" y2="85" stroke="#a3aab3" stroke-width="1"/>
    <line x1="-15" y1="60" x2="15" y2="60" stroke="#a3aab3" stroke-width="1"/>
    <line x1="-15" y1="35" x2="15" y2="35" stroke="#a3aab3" stroke-width="1"/>
    <line x1="-20" y1="10" x2="20" y2="10" stroke="#a3aab3" stroke-width="1"/>
    <line x1="-15" y1="-15" x2="15" y2="-15" stroke="#a3aab3" stroke-width="1"/>
    <line x1="-10" y1="-40" x2="10" y2="-40" stroke="#a3aab3" stroke-width="1"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">PostNatural History</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">Organisms altered by humans</text>
</svg>