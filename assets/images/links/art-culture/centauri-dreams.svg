<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>
  
  <!-- Stars background -->
  <g fill="white">
    <circle cx="50" cy="50" r="1"/>
    <circle cx="150" cy="80" r="1.5"/>
    <circle cx="250" cy="40" r="1"/>
    <circle cx="350" cy="70" r="1.2"/>
    <circle cx="450" cy="30" r="1"/>
    <circle cx="550" cy="60" r="1.5"/>
    <circle cx="650" cy="40" r="1"/>
    <circle cx="750" cy="80" r="1.2"/>
    <circle cx="100" cy="120" r="1"/>
    <circle cx="200" cy="150" r="1.2"/>
    <circle cx="300" cy="110" r="1"/>
    <circle cx="400" cy="140" r="1.5"/>
    <circle cx="500" cy="100" r="1"/>
    <circle cx="600" cy="130" r="1.2"/>
    <circle cx="700" cy="110" r="1"/>
    <circle cx="75" cy="200" r="1.5"/>
    <circle cx="175" cy="250" r="1"/>
    <circle cx="275" cy="210" r="1.2"/>
    <circle cx="375" cy="240" r="1"/>
    <circle cx="475" cy="200" r="1.5"/>
    <circle cx="575" cy="230" r="1.2"/>
    <circle cx="675" cy="190" r="1"/>
    <!-- Add more stars as needed -->
  </g>
  
  <!-- Alpha Centauri system -->
  <g transform="translate(400, 180)">
    <!-- Alpha Centauri A -->
    <circle cx="0" cy="0" r="35" fill="#e5c07b"/>
    <circle cx="0" cy="0" r="35" fill="url(#alphaGradient)"/>
    <!-- Alpha Centauri B orbit -->
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="none" stroke="#a3aab3" stroke-width="1" stroke-dasharray="5,5" opacity="0.7"/>
    <!-- Alpha Centauri B -->
    <circle cx="-100" cy="30" r="25" fill="#e86671"/>
    <circle cx="-100" cy="30" r="25" fill="url(#betaGradient)"/>
    <!-- Proxima Centauri (distant) -->
    <circle cx="200" cy="-40" r="10" fill="#c678dd"/>
    
    <!-- Hypothetical planet -->
    <circle cx="-100" cy="60" r="8" fill="#2ea043"/>
    <ellipse cx="-100" cy="30" rx="30" ry="40" fill="none" stroke="#2ea043" stroke-width="1" stroke-dasharray="2,2" transform="rotate(30 -100 30)"/>
  </g>
  
  <!-- Spacecraft trajectory -->
  <path d="M200,400 Q340,300 400,180" fill="none" stroke="#79c0ff" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Earth location (subtle hint) -->
  <circle cx="100" cy="400" r="20" fill="#1d4ed8" opacity="0.7"/>
  
  <!-- Spacecraft -->
  <g transform="translate(280, 280)">
    <path d="M0,-15 L15,15 L0,5 L-15,15 Z" fill="#a3aab3"/>
    <circle cx="0" cy="0" r="5" fill="#79c0ff"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="alphaGradient" cx="0.5" cy="0.5" r="0.5" fx="0.4" fy="0.4">
      <stop offset="0%" stop-color="#e5c07b" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#e5c07b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e5c07b" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="betaGradient" cx="0.5" cy="0.5" r="0.5" fx="0.4" fy="0.4">
      <stop offset="0%" stop-color="#e86671" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#e86671" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e86671" stop-opacity="1"/>
    </radialGradient>
  </defs>
  
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">Centauri Dreams</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">Exploring interstellar travel</text>
</svg>