<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>
  
  <!-- Museum display shelves -->
  <rect x="100" y="100" width="600" height="10" fill="#a3aab3"/>
  <rect x="100" y="200" width="600" height="10" fill="#a3aab3"/>
  <rect x="100" y="300" width="600" height="10" fill="#a3aab3"/>
  
  <!-- Vinyl record -->
  <g transform="translate(200, 150)">
    <circle cx="0" cy="0" r="40" fill="#3b4150"/>
    <circle cx="0" cy="0" r="38" fill="#1e1e2e"/>
    <circle cx="0" cy="0" r="15" fill="#3b4150"/>
    <circle cx="0" cy="0" r="3" fill="#1e1e2e"/>
    
    <!-- Grooves -->
    <g fill="none" stroke="#3b4150" stroke-width="0.5">
      <circle cx="0" cy="0" r="20"/>
      <circle cx="0" cy="0" r="25"/>
      <circle cx="0" cy="0" r="30"/>
      <circle cx="0" cy="0" r="35"/>
    </g>
  </g>
  
  <!-- Cassette tape -->
  <g transform="translate(400, 150)">
    <rect x="-30" y="-20" width="60" height="40" rx="2" fill="#a3aab3"/>
    
    <!-- Tape window -->
    <rect x="-20" y="-10" width="40" height="20" fill="#1e1e2e"/>
    
    <!-- Reels -->
    <circle cx="-10" cy="0" r="7" fill="#3b4150"/>
    <circle cx="10" cy="0" r="7" fill="#3b4150"/>
    
    <!-- Label area -->
    <rect x="-25" y="-17" width="50" height="7" fill="#3b4150"/>
  </g>
  
  <!-- Floppy disk -->
  <g transform="translate(600, 150)">
    <rect x="-25" y="-25" width="50" height="50" fill="#3b4150"/>
    <rect x="-20" y="-20" width="40" height="10" fill="#1e1e2e"/>
    <rect x="-15" y="-25" width="30" height="5" fill="#1e1e2e"/>
    
    <!-- Metal slider -->
    <rect x="-15" y="-10" width="30" height="5" fill="#a3aab3"/>
    
    <!-- Label area -->
    <rect x="-20" y="0" width="40" height="20" fill="#1e1e2e"/>
  </g>
  
  <!-- VHS tape -->
  <g transform="translate(200, 250)">
    <rect x="-40" y="-20" width="80" height="40" rx="3" fill="#3b4150"/>
    <rect x="-35" y="-15" width="70" height="30" rx="1" fill="#1e1e2e"/>
    
    <!-- VHS windows -->
    <circle cx="-25" cy="0" r="8" fill="#3b4150"/>
    <circle cx="25" cy="0" r="8" fill="#3b4150"/>
    
    <!-- Label area -->
    <rect x="-30" y="-10" width="60" height="20" fill="#3b4150" opacity="0.5"/>
  </g>
  
  <!-- CRT monitor -->
  <g transform="translate(400, 250)">
    <rect x="-40" y="-30" width="80" height="60" rx="5" fill="#a3aab3"/>
    <rect x="-35" y="-25" width="70" height="45" rx="3" fill="#1e1e2e"/>
    
    <!-- Screen content -->
    <text x="0" y="0" text-anchor="middle" font-family="monospace" font-size="8" fill="#79c0ff">C:\></text>
    
    <!-- Control knobs -->
    <circle cx="-25" cy="28" r="3" fill="#3b4150"/>
    <circle cx="-15" cy="28" r="3" fill="#3b4150"/>
    <circle cx="-5" cy="28" r="3" fill="#3b4150"/>
  </g>
  
  <!-- Pager/beeper -->
  <g transform="translate(600, 250)">
    <rect x="-15" y="-25" width="30" height="50" rx="5" fill="#3b4150"/>
    
    <!-- Screen -->
    <rect x="-10" y="-20" width="20" height="15" fill="#1e1e2e"/>
    
    <!-- Buttons -->
    <rect x="-8" y="0" width="5" height="5" rx="1" fill="#a3aab3"/>
    <rect x="3" y="0" width="5" height="5" rx="1" fill="#a3aab3"/>
    <rect x="-8" y="10" width="5" height="5" rx="1" fill="#a3aab3"/>
    <rect x="3" y="10" width="5" height="5" rx="1" fill="#a3aab3"/>
    <rect x="-8" y="20" width="16" height="3" rx="1" fill="#a3aab3"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" font-family="Arial" font-size="40" font-weight="bold" fill="white">Museum of Obsolete Media</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial" font-size="22" fill="#79c0ff">Preserving audio, video, and data formats</text>
</svg>