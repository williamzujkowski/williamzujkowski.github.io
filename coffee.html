<!DOCTYPE html>
<html lang="en" data-color-scheme="auto">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Coffee Calculator for Caffeinated Engineers">
    <meta name="keywords" content="Coffee, Calculator, IT Engineers, Tech Humor">
    <meta name="author" content="William Zujkowski">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coffee Calculator for IT Engineers</title>

    <script src="https://mizu.sh/client.js" defer></script>
    <link rel="stylesheet" href="https://matcha.mizu.sh/matcha.css">

    <script type="module" src="main.js"></script>
</head>

<body lang="en">
    <nav id="nav-container">
        <div id="dynamic-nav"></div>
    </nav>

    <main class="container">
        <header>
            <h1>Coffee Calculator for IT Engineers</h1>
            <p>Determine how many cups (or pots!) of coffee your bleary-eyed coders need for those 2 AM deployments!</p>
        </header>

        <section>
            <form id="coffeeForm" onsubmit="return false;" class="p-1">
                <fieldset class="p-1">
                    <legend><b>Enter Your Coffee Details:</b></legend>

                    <label for="javaAttendees">Number of Devs:
                        <input type="number" id="javaAttendees" value="3">
                    </label>

                    <label for="coffeeStrength">Coffee Strength:
                        <select id="coffeeStrength">
                            <option value="1">Mild</option>
                            <option value="2">Regular</option>
                            <option value="3">Strong</option>
                            <option value="5">Espresso Shots Only</option>
                            <option value="10">Triple Espresso Shots (Danger!)</option>
                        </select>
                    </label>

                    <label for="hoursCoding">Hours of Coding:
                        <input type="number" id="hoursCoding" value="4">
                    </label>

                    <label for="timesBuildFailed">Times the Build Failed:
                        <input type="number" id="timesBuildFailed" value="2">
                    </label>
                    <div class="mt-1">
                        <button class="mr-0.5" type="button" onclick="calculateCoffee()">Calculate</button>
                        <button class="mr-0.5" type="button" onclick="downloadCoffeeReport()">Download Report</button>
                        <button type="button" onclick="shareCoffeeReport()">Share</button>
                    </div>
                </fieldset>
            </form>
        </section>

        <section id="coffeeProgressSection" class="mt-2">
            <progress id="progressBar" class="block width-100" value="0" max="100"></progress>
            <p id="progressLabel" class="mt-0.5"></p>
        </section>

        <section id="coffeeResultSection">
            <div id="coffeeResult" role="alert" aria-live="polite"></div>
        </section>

        <a id="downloadCoffeeLink" href="#" download="Coffee_Calculation_Report.txt" hidden>Download Coffee Report</a>
    </main>

    <footer id="footer-container">
        <div id="dynamic-footer"></div>
    </footer>
    <div id="toast" role="alert" aria-live="assertive"></div>
</body>

</html>
