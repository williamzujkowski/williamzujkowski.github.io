<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Calculator - William Zujkowski</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header>
        <nav id="dynamic-nav"></nav> </header>
        
        <main>
            <section>
                <h1>Coffee Calculator</h1>
                <form id="coffeeForm">
                    <label for="attendees">Number of Attendees:</label>
                    <input type="number" id="attendees" name="attendees" min="1" required>

                    <label for="coffeeStrength">Coffee Strength:</label>
                    <select id="coffeeStrength" name="coffeeStrength">
                        <option value="light">Light</option>
                        <option value="medium">Medium</option>
                        <option value="strong">Strong</option>
                    </select>

                    <label for="hoursCoding">Hours Coding:</label>
                    <input type="number" id="hoursCoding" name="hoursCoding" min="0" required>

                    <label for="buildFailures">Build Failures:</label>
                    <input type="number" id="buildFailures" name="buildFailures" min="0" required>

                    <button type="button" onclick="calculateCoffee()">Calculate</button>
                </form>

                <div id="result"></div>
            </section>
        </main>

        <footer id="dynamic-footer"></footer>

        <script src="js/main.js"></script>
</body>

</html>
