<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Calculator - William Zujkowski</title>
    < link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header>
        <nav id="dynamic-nav"></nav>
    </header>
    php
    <main>
        <section>
            <h1>Pizza Calculator</h1>
            <form id="pizzaForm">
                <label for="attendees">Number of Attendees:</label>
                <input type="number" id="attendees" name="attendees" min="1" required>

                <label for="slicesPerPerson">Slices per Person:</label>
                <input type="number" id="slicesPerPerson" name="slicesPerPerson" min="1" required>

                <label for="hoursDebugging">Hours Debugging:</label>
                <input type="number" id="hoursDebugging" name="hoursDebugging" min="0" required>

                <label for="pizzaType">Pizza Type:</label>
                <select id="pizzaType" name="pizzaType">
                    <option value="standard">Standard</option>
                    <option value="gourmet">Gourmet</option>
                    <option value="enterprise">Enterprise</option>
                </select>

                <button type="button" onclick="calculatePizzas()">Calculate</button>
            </form>

            <div id="result"></div>
        </section>
    </main>

    <footer id="dynamic-footer"></footer>

    <script src="js/main.js"></script>
</body>

</html>
