<!DOCTYPE html>
<html lang="en" data-color-scheme="auto">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Pizza Calculator for IT Engineers">
    <meta name="keywords" content="Pizza, Calculator, IT Engineers, Tech Humor, Fun Tool">
    <meta name="author" content="William Zujkowski">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pizza Calculator for IT Engineers</title>
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="assets/mizu/matcha.css">
    <script src="assets/mizu/client.js" defer></script>
    <script type="module" src="assets/js/main.js" defer></script>
</head>

<!-- *mizu on body for consistency, though pizza doesn't need %http either. -->

<body lang="en" data-color-scheme="auto" *mizu>
    <nav id="nav-container">
        <div id="dynamic-nav"></div>
    </nav>
    <div id="darkModeToggleContainer"></div>

    <main class="container">
        <header>
            <h1>Pizza Calculator for IT Engineers</h1>
            <p>Calculate how much pizza your hungry engineers need after hours of debugging!</p>
        </header>

        <section>
            <form id="pizzaForm" onsubmit="return false;" class="p-1">
                <fieldset class="p-1">
                    <legend><b>Enter Your Details:</b></legend>

                    <label for="attendees">Number of Attendees:
                        <input type="number" id="attendees" name="attendees" value="5">
                    </label>

                    <label for="pizzaType">Select Pizza Style:
                        <select id="pizzaType" name="pizzaType">
                            <option value="1">NY Pizza (Default)</option>
                            <option value="0.5">Detroit Pizza</option>
                            <option value="0.6">Chicago Pizza</option>
                            <option value="2">California Pizza Kitchen</option>
                            <option value="3">Hot Pockets</option>
                            <option value="100">Blockchain Pizza</option>
                            <option value="cloud">Cloud Pizza</option>
                        </select>
                    </label>

                    <label for="slicesPerPerson">Average Slices per Person:
                        <input type="number" id="slicesPerPerson" name="slicesPerPerson" value="3">
                    </label>

                    <label for="hoursDebugging">Hours Spent Debugging:
                        <input type="number" id="hoursDebugging" name="hoursDebugging" value="2">
                    </label>
                    <div class="mt-1">
                        <button class="mr-0.5" type="button" onclick="calculatePizzas()">Calculate</button>
                        <button class="mr-0.5" type="button" onclick="downloadReport()">Download Report</button>
                    </div>
                </fieldset>
            </form>
        </section>

        <section id="progressSection" class="mt-2">
            <progress id="progressBar" class="block width-100" value="0" max="100"></progress>
            <p id="progressLabel" class="mt-0.5"></p>
        </section>

        <section id="resultSection">
            <div id="result" role="alert" aria-live="polite"></div>
        </section>

        <section id="emailPromptSection" class="mt-2" hidden>
            <p>If you're ordering 42 pizzas or more, please provide your email so our Enterprise Pizza Sales Team can
                contact you:</p>
            <label for="emailInput">
                <input type="email" id="emailInput" placeholder="Enter your email">
            </label>
            <button type="button" onclick="submitEmail()">Submit Email</button>
        </section>
    </main>

    <footer id="footer-container">
        <div id="dynamic-footer"></div>
    </footer>

    <div id="toast" role="alert" aria-live="assertive"></div>
</body>

</html>
