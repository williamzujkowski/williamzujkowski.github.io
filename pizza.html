<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Pizza Calculator for IT Engineers">
    <meta name="keywords" content="Pizza, Calculator, IT Engineers, Tech Humor, Fun Tool">
    <meta name="author" content="William Zujkowski">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pizza Calculator for IT Engineers</title>

    <!-- Mizu.js and Matcha CSS -->
    <script src="https://mizu.sh/client.js" defer></script>
    <link rel="stylesheet" href="https://matcha.mizu.sh/matcha.css">

    <!-- nav_gen.js & footer_gen.js -->
    <script src="nav_gen.js" defer></script>
    <script src="footer_gen.js" defer></script>

    <style>
        #progressContainer {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 1rem;
        }

        #progressBar {
            height: 20px;
            width: 0;
            background-color: green;
            transition: width 0.5s ease-in-out;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 9999;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 17px;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }

        #downloadLink {
            display: none;
        }
    </style>
</head>

<body lang="en">
    <!-- Dynamic nav placeholder -->
    <div id="dynamic-nav"></div>

    <main class="container">
        <header>
            <h1>Pizza Calculator for IT Engineers</h1>
            <p>Calculate how much pizza your hungry engineers need after hours of debugging!</p>
        </header>

        <section>
            <form id="pizzaForm" onsubmit="return false;">
                <fieldset>
                    <legend>Enter Your Details:</legend>

                    <div>
                        <label for="attendees">Number of Attendees:</label>
                        <input type="number" id="attendees" name="attendees" value="5">
                    </div>

                    <div>
                        <label for="pizzaType">Select Pizza Style:</label>
                        <select id="pizzaType" name="pizzaType">
                            <option value="1">NY Pizza (Default)</option>
                            <option value="0.5">Detroit Pizza</option>
                            <option value="0.6">Chicago Pizza</option>
                            <option value="2">California Pizza Kitchen</option>
                            <option value="3">Hot Pockets</option>
                            <option value="100">Blockchain Pizza</option>
                            <option value="cloud">Cloud Pizza</option>
                        </select>
                    </div>

                    <div>
                        <label for="slicesPerPerson">Average Slices per Person:</label>
                        <input type="number" id="slicesPerPerson" name="slicesPerPerson" value="3">
                    </div>

                    <div>
                        <label for="hoursDebugging">Hours Spent Debugging:</label>
                        <input type="number" id="hoursDebugging" name="hoursDebugging" value="2">
                    </div>

                    <button type="button" onclick="calculatePizzas()">Calculate</button>
                    <button type="button" onclick="downloadReport()">Download Report</button>
                </fieldset>
            </form>
        </section>

        <section id="progressSection">
            <div id="progressContainer">
                <div id="progressBar"></div>
            </div>
            <p id="progressLabel"></p>
        </section>

        <section id="resultSection">
            <div id="result" role="alert" aria-live="polite"></div>
        </section>

        <section id="emailPromptSection" style="display:none;">
            <p>If you're ordering 42 pizzas or more, please provide your email so our Enterprise Pizza Sales Team can
                contact you:</p>
            <input type="email" id="emailInput" placeholder="Enter your email">
            <button type="button" onclick="submitEmail()">Submit Email</button>
        </section>

        <a id="downloadLink" href="#" download="Pizza_Calculation_Report.txt">Download Pizza Report</a>
    </main>

    <!-- Dynamic footer placeholder -->
    <div id="dynamic-footer"></div>

    <script src="pizza_calc.js"></script>
</body>

</html>
