<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizza Calculator - William Zujkowski</title>
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>
    <!-- Header with ARIA role -->
    <header role="banner">
        <nav role="navigation" aria-label="Main Navigation" id="dynamic-nav"></nav>
    </header>

    <main role="main">
        <section aria-labelledby="pizza-heading">
            <h1 id="pizza-heading">Pizza Calculator</h1>

            <!-- 
        Pizza Calculator Form 
        This form calculates how many pizzas to order based on:
        - Number of attendees
        - Slices per person
        - Hours spent debugging
        - Pizza type preference
      -->
            <form id="pizzaForm">
                <label for="attendees">Number of Attendees:</label>
                <input type="number" id="attendees" name="attendees" min="1" required aria-required="true" />

                <label for="slicesPerPerson">Slices per Person:</label>
                <input type="number" id="slicesPerPerson" name="slicesPerPerson" min="1" required
                    aria-required="true" />

                <label for="hoursDebugging">Hours Debugging:</label>
                <input type="number" id="hoursDebugging" name="hoursDebugging" min="0" required aria-required="true" />

                <label for="pizzaType">Pizza Type:</label>
                <select id="pizzaType" name="pizzaType" aria-required="true">
                    <option value="standard">Standard</option>
                    <option value="gourmet">Gourmet</option>
                    <option value="enterprise">Enterprise</option>
                </select>

                <button type="button" onclick="calculatePizzas()" aria-label="Calculate pizza order">
                    Calculate
                </button>
            </form>

            <!-- Result display -->
            <div id="result" aria-live="polite"></div>
        </section>
    </main>

    <footer role="contentinfo" id="dynamic-footer"></footer>

    <!-- Main script -->
    <script src="js/main.js"></script>
</body>

</html>
