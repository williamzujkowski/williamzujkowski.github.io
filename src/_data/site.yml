# Site metadata
title: William Zujkowski
tagline: Developer, Writer, Creator
description: Personal website and blog of William Zujkowski
baseUrl: https://williamzujkowski.github.io
language: en

# Contact information
email: william@example.com
location: New York, NY

# Social links
social:
  github: https://github.com/williamzujkowski
  twitter: https://twitter.com/williamzujkowski
  linkedin: https://linkedin.com/in/williamzujkowski
  mastodon: https://mastodon.social/@williamzujkowski

# Theme settings
theme:
  # Colors in OKLCH format
  colors:
    primary: oklch(0.65 0.2 240)    # Blue
    secondary: oklch(0.8 0.1 200)   # Light blue
    accent: oklch(0.6 0.3 30)       # Orange
    background: oklch(0.98 0 0)     # White
    text: oklch(0.2 0 0)            # Dark gray
    muted: oklch(0.7 0 0)           # Medium gray
    
  # Typography
  typography:
    bodyFont: "'Inter', system-ui, -apple-system, sans-serif"
    headingFont: "'Inter', system-ui, -apple-system, sans-serif"
    codeFont: "'JetBrains Mono', 'Fira Code', monospace"
    baseFontSize: "18px"
    lineHeight: "1.6"
    
  # Layout
  layout:
    maxWidth: "1200px"
    contentWidth: "800px"
    
  # Dark mode settings
  darkMode:
    enabled: true
    colors:
      background: oklch(0.2 0 0)     # Dark gray
      text: oklch(0.9 0 0)           # Light gray
