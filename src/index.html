<h3 class="f3">Today's Historical Fact:</h3>
<p id="daily-fact" class="f4">Loading...</p>

<script>
    const factElement = document.getElementById('daily-fact');

    fetch('http://numbersapi.com/random/date')
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.text();
        })
        .then(fact => {
            factElement.innerText = fact;
        })
        .catch(error => {
            console.error('There was a problem with the fetch operation:', error);
            factElement.innerText = 'Could not fetch a historical fact at this time. Please try again later.';
        });
</script>
