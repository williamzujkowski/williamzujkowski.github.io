<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Verification</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; }
    .screenshots { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
    .screenshot { border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
    .screenshot img { max-width: 100%; height: auto; }
    .caption { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Screenshot Verification</h1>
  <div class="screenshots">
    <div class="screenshot">
      <img src="/assets/data/screenshots/github.jpg" alt="GitHub">
      <div class="caption">GitHub</div>
    </div>
    <div class="screenshot">
      <img src="/assets/data/screenshots/centauri-dreams.jpg" alt="Centauri Dreams">
      <div class="caption">Centauri Dreams</div>
    </div>
    <div class="screenshot">
      <img src="/assets/data/screenshots/museum-of-obsolete-media.jpg" alt="Museum of Obsolete Media">
      <div class="caption">Museum of Obsolete Media</div>
    </div>
    <div class="screenshot">
      <img src="/assets/data/screenshots/paperclip-ai-game.jpg" alt="Paperclip AI Game">
      <div class="caption">Paperclip AI Game</div>
    </div>
    <div class="screenshot">
      <img src="/assets/data/screenshots/learn-x-in-y-minutes.jpg" alt="Learn X in Y Minutes">
      <div class="caption">Learn X in Y Minutes</div>
    </div>
    <div class="screenshot">
      <img src="/assets/data/screenshots/orions-arm-universe-project.jpg" alt="Orion's Arm Universe Project">
      <div class="caption">Orion's Arm Universe Project</div>
    </div>
  </div>
</body>
</html>
