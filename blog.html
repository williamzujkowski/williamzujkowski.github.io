<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog - William Zujkowski</title>
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>
    <!-- Header -->
    <header role="banner">
        <nav role="navigation" aria-label="Main Navigation" id="dynamic-nav"></nav>
    </header>

    <main role="main">
        <section aria-labelledby="blog-heading">
            <h1 id="blog-heading">My Blog</h1>
            <p>
                Welcome to my blog! I love diving into topics like AI, cybersecurity, and general software development.
                Below, you can search posts or simply browse through my latest thinking.
            </p>

            <!-- Blog Search -->
            <div class="blog-search">
                <label for="searchInput" class="visually-hidden">Search blog posts</label>
                <input type="text" id="searchInput" placeholder="Search blog posts..." oninput="filterBlogPosts()"
                    aria-label="Search blog posts" />
                <button type="button" onclick="resetBlogFilter()">Reset</button>
            </div>

            <!-- Dynamic Blog List -->
            <div id="blogListDiv"></div>

            <!-- Pagination Controls -->
            <div id="pagination">
                <button id="prevPage" onclick="prevPage()">Previous</button>
                <button id="nextPage" onclick="nextPage()">Next</button>
            </div>
        </section>
    </main>

    <footer role="contentinfo" id="dynamic-footer"></footer>

    <!-- Main script -->
    <script src="js/main.js"></script>
</body>

</html>
