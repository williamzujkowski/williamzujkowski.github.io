<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="All Blog Posts - William Zujkowski">
    <meta name="keywords" content="Blog, William Zujkowski, Tech, Pizza, Coffee, Homelab, Docker, Podman">
    <meta name="author" content="William Zujkowski">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blog Archives - William Zujkowski</title>

    <!-- Mizu.js and Matcha CSS -->
    <script src="https://mizu.sh/client.js" defer></script>
    <link rel="stylesheet" href="https://matcha.mizu.sh/matcha.css">

    <!-- nav_gen.js & footer_gen.js for dynamic nav/footer -->
    <script src="nav_gen.js" defer></script>
    <script src="footer_gen.js" defer></script>

    <style>
        main {
            margin-top: 1rem;
        }

        nav[toc] ul {
            list-style: none;
            padding-left: 1rem;
            border: 1px solid rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        nav[toc] ul li {
            margin: 0.25rem 0;
        }

        nav[toc] a {
            text-decoration: none;
            color: blue;
        }

        nav[toc] a:hover {
            text-decoration: underline;
        }

        .blog-title {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .blog-date {
            font-style: italic;
            color: gray;
            margin-bottom: 1rem;
        }

        article {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
            padding-bottom: 1rem;
        }

        article:last-of-type {
            border-bottom: none;
        }

        .search-container {
            margin-bottom: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-container label {
            font-weight: bold;
        }

        .search-container input {
            width: 250px;
            max-width: 100%;
        }
    </style>
</head>

<body lang="en">
    <!-- Dynamic nav placeholder -->
    <div id="dynamic-nav"></div>

    <main class="container" *mizu>
        <header>
            <h1>All Blog Posts</h1>
            <p>Welcome to the archives! Expand each post for more details.</p>
        </header>

        <div class="search-container">
            <label for="blogSearch">Search Posts:</label>
            <input type="text" id="blogSearch" placeholder="Type keywords...">
            <button type="button" onclick="filterBlogPosts()">Filter</button>
            <button type="button" onclick="resetBlogFilter()">Reset</button>
        </div>

        <nav *toc="'#blog-archive'" [h2+]></nav>
        <div %http="'blog_data.html'" %response="renderBlogPostsHTML($response)"></div>
        <section id="blog-archive"></section>
    </main>

    <!-- Dynamic footer placeholder -->
    <div id="dynamic-footer"></div>

    <script>
        let allArticles = [];

        async function renderBlogPostsHTML(resp) {
            const textData = await resp.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(textData, 'text/html');
            allArticles = Array.from(doc.querySelectorAll('article'));

            if (!allArticles.length) {
                console.error('No posts found in blog_data.html');
                return;
            }

            // Sort by date descending
            allArticles.sort((a, b) => {
                const dateA = new Date(a.getAttribute('data-date'));
                const dateB = new Date(b.getAttribute('data-date'));
                return dateB - dateA;
            });

            renderArticles(allArticles);
        }

        function renderArticles(articles) {
            const archiveSection = document.getElementById('blog-archive');
            archiveSection.innerHTML = '';

            articles.forEach(article => {
                const dateAttr = article.getAttribute('data-date');
                const slug = article.getAttribute('data-slug') || '';
                const titleEl = article.querySelector('h2');
                const postTitle = titleEl ? titleEl.textContent.trim() : '(Untitled)';
                const articleContent = article.innerHTML;

                const detailsHtml = `
                <article id="${slug}">
                    <div class="blog-title">${postTitle}</div>
                    <div class="blog-date">${dateAttr}</div>
                    <details>
                        <summary>${postTitle}</summary>
                        <div>${articleContent}</div>
                    </details>
                </article>
            `;
                archiveSection.insertAdjacentHTML('beforeend', detailsHtml);
            });
        }

        window.filterBlogPosts = function () {
            const searchValue = document.getElementById('blogSearch').value.toLowerCase().trim();
            if (!searchValue) {
                renderArticles(allArticles);
                return;
            }
            const filtered = allArticles.filter(article => {
                const text = article.textContent.toLowerCase();
                return text.includes(searchValue);
            });
            renderArticles(filtered);
        };

        window.resetBlogFilter = function () {
            document.getElementById('blogSearch').value = '';
            renderArticles(allArticles);
        };
    </script>
</body>

</html>
