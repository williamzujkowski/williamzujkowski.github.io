<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog - William Zujkowski</title>
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>
    <!-- Header -->
    <header role="banner">
        <nav role="navigation" aria-label="Main Navigation" id="dynamic-nav"></nav>
    </header>

        <div style="margin-bottom: 1rem;">
            <label for="blogSearch"><b>Search Posts:</b></label>
            <input type="text" id="blogSearch" placeholder="Type keywords...">
            <button type="button" onclick="filterBlogPosts()">Filter</button>
            <button type="button" onclick="resetBlogFilter()">Reset</button>
        </div>

        <section id="blog-archive"></section>
    </main>

    <footer role="contentinfo" id="dynamic-footer"></footer>

    <!-- Main script -->
    <script src="js/main.js"></script>
</body>

</html>
