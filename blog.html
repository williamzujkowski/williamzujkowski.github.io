<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="All Blog Posts - William Zujkowski">
    <meta name="keywords" content="Blog, William Zujkowski, Tech, Pizza, Coffee, Homelab, Docker, Podman">
    <meta name="author" content="William Zujkowski">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Archives - William Zujkowski</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <div id="dynamic-nav"></div>
    <main class="container">
        <header>
            <h1>All Blog Posts</h1>
            <p>Welcome to the archives! Expand each post for more details.</p>
        </header>
        <div class="search-container">
            <label for="blogSearch">Search Posts:</label>
            <input type="text" id="blogSearch" placeholder="Type keywords...">
            <button type="button" onclick="filterBlogPosts()">Filter</button>
            <button type="button" onclick="resetBlogFilter()">Reset</button>
        </div>
        <section id="blog-archive"></section>
    </main>
    <div id="dynamic-footer"></div>
    <div id="toast"></div>
    <!-- Secret Code -->
    <div id="secret-code" style="display: none;">
        <h2>🔒 Secret Unlocked!</h2>
        <p>Thanks for peeking behind the curtain! You found my hidden Easter egg.</p>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/H62G3m_MHQk" title="YouTube video player"
            frameborder="0" allowfullscreen></iframe>
    </div>
    <script src="assets/js/main.js"></script>
    <script>
        async function loadBlogPosts() {
            try {
                const response = await fetch('blog_data.html');
                const data = await response.text();
                const tempContainer = document.createElement('div');
                tempContainer.innerHTML = data;
                const articles = tempContainer.querySelectorAll('article');
                const archiveContainer = document.getElementById('blog-archive');
                articles.forEach(article => {
                    const wrapper = document.createElement('div');
                    wrapper.classList.add('blog-article-wrapper');
                    wrapper.innerHTML = article.innerHTML;
                    archiveContainer.appendChild(wrapper);
                });
            } catch (err) {
                console.error('Error fetching blog data:', err);
            }
        }
        loadBlogPosts();

        window.filterBlogPosts = function () {
            const searchInput = document.getElementById('blogSearch').value.toLowerCase().trim();
            const wrappers = document.querySelectorAll('.blog-article-wrapper');
            wrappers.forEach(wrapper => {
                wrapper.style.display = wrapper.textContent.toLowerCase().includes(searchInput) ? 'block' : 'none';
            });
        };

        window.resetBlogFilter = function () {
            document.getElementById('blogSearch').value = '';
            document.querySelectorAll('.blog-article-wrapper').forEach(wrapper => {
                wrapper.style.display = 'block';
            });
        };
    </script>
</body>

</html>
