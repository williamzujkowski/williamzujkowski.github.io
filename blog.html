<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - William Zujkowski</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header>
        <nav id="dynamic-nav"></nav>
    </header>

    <main>
        <section>
            <h1>Blog</h1>
            <input type="text" id="searchInput" placeholder="Search blog posts..." oninput="filterBlogPosts()">
            <button onclick="resetBlogFilter()">Reset</button>

            <div id="blogListDiv"></div>
            <div id="pagination">
                <button id="prevPage" onclick="prevPage()">Previous</button>
                <button id="nextPage" onclick="nextPage()">Next</button>
            </div>
        </section>
    </main>

    <footer id="dynamic-footer"></footer>

    <script src="js/main.js"></script>
</body>

</html>
