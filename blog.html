<!DOCTYPE html>
<html lang="en" data-color-scheme="auto">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="All Blog Posts - William Zujkowski">
    <meta name="keywords"
        content="Blog, William Zujkowski, Tech, Cybersecurity, AI, ML, Homelab, Cloud, Security, Coding">
    <meta name="author" content="William Zujkowski">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blog Archives - William Zujkowski</title>

    <script src="https://mizu.sh/client.js" defer></script>
    <link rel="stylesheet" href="https://matcha.mizu.sh/matcha.css">

    <script type="module" src="main.js"></script>
</head>

<body lang="en">
    <nav id="nav-container">
        <div id="dynamic-nav"></div>
    </nav>

    <main class="container" *mizu>
        <header>
            <h1>All Blog Posts</h1>
            <p>Welcome to the archives! Expand each post for more details.</p>
        </header>

        <div class="search-container flex wrap gap-0.5">
            <label for="blogSearch"><b>Search Posts:</b></label>
            <input type="text" id="blogSearch" placeholder="Type keywords..." class="flex-grow-1 bd-muted p-0.5">
            <button type="button" class="bg-accent p-0.5 bd-accent" onclick="filterBlogPosts()">Filter</button>
            <button type="button" class="bg-accent p-0.5 bd-accent" onclick="resetBlogFilter()">Reset</button>
        </div>

        <!-- Mizu for loading the blog_data.html -->
        <div %http="'blog_data.html'" %response="renderBlogPostsHTML($response)"></div>
        <section id="blog-archive"></section>
    </main>

    <footer id="footer-container">
        <div id="dynamic-footer"></div>
    </footer>
</body>

</html>
