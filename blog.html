<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="All Blog Posts - William Zujkowski">
    <meta name="keywords"
        content="Blog, William Zujkowski, Tech, Cybersecurity, AI, ML, Homelab, Cloud, Security, Coding">
    <meta name="author" content="William Zujkowski">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blog Archives - William Zujkowski</title>
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="assets/css/styles.css">
    <script type="module" src="assets/js/main.js"></script>
</head>

<body>
    <nav id="nav-container">
        <ul id="dynamic-nav"></ul>
    </nav>

    <main class="container">
        <header>
            <h1>All Blog Posts</h1>
            <p>Welcome to the archives! Expand each post for more details.</p>
        </header>

        <div style="margin-bottom: 1rem;">
            <label for="blogSearch"><b>Search Posts:</b></label>
            <input type="text" id="blogSearch" placeholder="Type keywords..." onkeypress="handleKeyPress(event)">
            <button type="button" onclick="filterBlogPosts()">Filter</button>
            <button type="button" onclick="resetBlogFilter()">Reset</button>
        </div>

        <section id="blog-archive"></section>

        <section class="pagination">
            <button id="prevPage" onclick="prevPage()" disabled>Previous</button>
            <button id="nextPage" onclick="nextPage()" disabled>Next</button>
        </section>
    </main>

    <footer>
        <div id="dynamic-footer"></div>
    </footer>

    <div id="toast" role="alert" aria-live="assertive"></div>

    <script>
        // Handle Enter key for filter button
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                filterBlogPosts();
            }
        }
    </script>
</body>

</html>
