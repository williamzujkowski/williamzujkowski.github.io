<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="All Blog Posts - William Zujkowski">
    <meta name="keywords"
        content="Blog, William Zujkowski, Tech, Cybersecurity, AI, ML, Homelab, Cloud, Security, Coding">
    <meta name="author" content="William Zujkowski">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Archives - William Zujkowski</title>
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script type="module" src="assets/js/main.js"></script>
</head>

<body>
    <nav id="nav-container">
        <ul id="dynamic-nav"></ul>
    </nav>

    <main class="container">
        <header>
            <h1>All Blog Posts</h1>
            <p>Hi there! Here’s a complete collection of my blog posts, from security insights to HPC quirks. Scroll
                down or use the search below to find exactly what you’re looking for.</p>
        </header>

        <div class="search-container">
            <label for="blogSearch"><b>Search Posts:</b></label>
            <input type="text" id="blogSearch" placeholder="Type keywords...">
            <button type="button" onclick="filterBlogPosts()">Filter</button>
            <button type="button" onclick="resetBlogFilter()">Reset</button>
        </div>

        <!-- Table of Contents container, populated by JS -->
        <section id="table-of-contents">
            <h2>Table of Contents</h2>
            <ul id="toc-list"></ul>
        </section>

        <!-- Blog posts are fetched from blog_data.html and displayed here -->
        <section id="blog-archive"></section>
    </main>

    <footer>
        <div id="dynamic-footer"></div>
    </footer>

    <!-- Floating Back to Top Button -->
    <button id="back-to-top" onclick="scrollToTop()">Top</button>
</body>

</html>
