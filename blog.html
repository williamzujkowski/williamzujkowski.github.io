<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Welcome to William Zujkowski's Personal Website" />
  <meta name="keywords" content="William Zujkowski, Cybersecurity, Blog, Calculators" />
  <meta name="author" content="William Zujkowski" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- No Google Fonts; using system fonts -->
  <title>Blog - William Zujkowski</title>
  <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <!-- Include htmx -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>

<body>
  <div hx-get="/includes/nav.html" hx-trigger="load" hx-swap="outerHTML"></div>
  <main class="container">
    <header>
      <h1>All Blog Posts</h1>
      <p>Explore my thoughts on cybersecurity, AI, and the evolving tech landscape.</p>
    </header>
    <section id="blogPostsContainer">
      <!-- Blog posts will be loaded here from blog_list.json -->
    </section>
    <section id="paginationControls" class="pagination"></section>
  </main>
  <footer hx-get="/includes/footer.html" hx-trigger="load" hx-swap="outerHTML"></footer>
  <script>
    const articlesPerPage = 3;
    let allPosts = [];
    let currentPage = 1;

    function renderPosts() {
      const container = document.getElementById("blogPostsContainer");
      container.innerHTML = "";
      const start = (currentPage - 1) * articlesPerPage;
      const end = start + articlesPerPage;
      const postsToShow = allPosts.slice(start, end);

      postsToShow.forEach(post => {
        const postDiv = document.createElement("article");
        postDiv.className = "article-preview";
        postDiv.innerHTML = `
            <h2><a href="/blog/${post.slug}.html">${post.title}</a></h2>
            <p><strong>Date:</strong> ${post.date}</p>
          `;
        container.appendChild(postDiv);
      });
      renderPagination();
    }

    function renderPagination() {
      const paginationDiv = document.getElementById("paginationControls");
      paginationDiv.innerHTML = "";
      const totalPages = Math.ceil(allPosts.length / articlesPerPage);
      if (totalPages <= 1) return;

      const prevBtn = document.createElement("button");
      prevBtn.innerText = "Previous";
      prevBtn.disabled = (currentPage === 1);
      prevBtn.onclick = () => {
        if (currentPage > 1) {
          currentPage--;
          renderPosts();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };
      paginationDiv.appendChild(prevBtn);

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.innerText = i;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => {
          currentPage = i;
          renderPosts();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        paginationDiv.appendChild(btn);
      }

      const nextBtn = document.createElement("button");
      nextBtn.innerText = "Next";
      nextBtn.disabled = (currentPage === totalPages);
      nextBtn.onclick = () => {
        if (currentPage < totalPages) {
          currentPage++;
          renderPosts();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };
      paginationDiv.appendChild(nextBtn);
    }

    function loadBlogPosts() {
      fetch("/blog_list.json")
        .then(response => response.json())
        .then(data => {
          data.sort((a, b) => new Date(b.date) - new Date(a.date));
          allPosts = data;
          renderPosts();
        })
        .catch(error => {
          console.error("Error loading blog posts:", error);
          document.getElementById("blogPostsContainer").innerText = "Error loading blog posts.";
        });
    }

    document.addEventListener("DOMContentLoaded", loadBlogPosts);
  </script>
</body>

</html>
